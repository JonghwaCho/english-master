<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Master · 로그인</title>
  <style>
    :root {
      --bg: #0f0f1a; --text: #e2e8f0; --muted: #94a3b8;
      --primary: #6366f1; --primary-hover: #818cf8; --purple: #a78bfa;
      --border: #334155; --red: #ef4444; --card: rgba(30, 27, 60, 0.55);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 20% -10%, #1e1040 0%, transparent 60%),
                  radial-gradient(1000px 500px at 100% 20%, #042f2e 0%, transparent 55%),
                  var(--bg);
      color: var(--text); min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .card {
      width: 100%; max-width: 400px;
      background: var(--card);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border); border-radius: 20px;
      padding: 40px 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .brand { text-align: center; margin-bottom: 28px; }
    .brand h1 {
      font-size: 26px; font-weight: 800;
      background: linear-gradient(90deg, var(--primary), var(--purple));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .brand p { color: var(--muted); font-size: 13px; margin-top: 6px; }
    .tabs { display: flex; gap: 6px; background: rgba(15,15,26,0.6); border-radius: 12px; padding: 4px; margin-bottom: 22px; }
    .tab {
      flex: 1; padding: 9px; text-align: center; border-radius: 9px; cursor: pointer;
      font-size: 14px; font-weight: 600; color: var(--muted); transition: all .15s;
    }
    .tab.active { background: var(--primary); color: #fff; }
    label { display: block; font-size: 12px; color: var(--muted); margin: 14px 0 6px; }
    input {
      width: 100%; padding: 12px 14px; border-radius: 10px;
      border: 1px solid var(--border); background: rgba(15,15,26,0.7);
      color: var(--text); font-size: 15px; outline: none; transition: border-color .15s;
    }
    input:focus { border-color: var(--primary); }
    .btn {
      width: 100%; margin-top: 22px; padding: 13px; border: none; border-radius: 11px;
      background: linear-gradient(90deg, var(--primary), var(--purple));
      color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity .15s;
    }
    .btn:hover { opacity: .9; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 22px 0 16px; color: var(--muted); font-size: 12px; }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
    .btn-google {
      width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 11px;
      background: #fff; color: #1f2937; font-size: 14px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-google:disabled { opacity: .55; cursor: not-allowed; }
    .btn-google svg { width: 18px; height: 18px; }
    .msg { margin-top: 16px; font-size: 13px; text-align: center; min-height: 18px; }
    .msg.error { color: var(--red); }
    .hint { font-size: 11px; color: var(--muted); margin-top: 5px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <h1>English Master</h1>
      <p>YouTube로 배우는 영어 학습</p>
    </div>

    <div class="tabs">
      <div class="tab active" id="tab-login" onclick="switchMode('login')">로그인</div>
      <div class="tab" id="tab-signup" onclick="switchMode('signup')">회원가입</div>
    </div>

    <form id="authForm" onsubmit="return submitForm(event)">
      <div id="nameField" style="display:none">
        <label>이름 (선택)</label>
        <input type="text" id="name" autocomplete="name" placeholder="홍길동">
      </div>

      <label>이메일</label>
      <input type="email" id="email" autocomplete="email" placeholder="you@example.com" required>

      <label>비밀번호</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" required>
      <div class="hint" id="pwHint" style="display:none">8자 이상 입력하세요</div>

      <button type="submit" class="btn" id="submitBtn">로그인</button>
    </form>

    <div class="divider">또는</div>
    {% if google_enabled %}
    <button class="btn-google" onclick="location.href='/api/auth/google'">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1A11 11 0 0 0 2.18 7.06l3.66 2.84C6.71 7.3 9.14 5.38 12 5.38z"/></svg>
      Google로 계속하기
    </button>
    {% else %}
    <button class="btn-google" disabled title="구글 로그인은 준비 중입니다">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1A11 11 0 0 0 2.18 7.06l3.66 2.84C6.71 7.3 9.14 5.38 12 5.38z"/></svg>
      Google로 계속하기 (준비 중)
    </button>
    {% endif %}

    <div class="msg" id="msg"></div>
  </div>

  <script>
    let mode = 'login';

    var lastEmail = '';

    // 구글 콜백/이메일 인증 등에서 넘어온 상태 표시
    (function() {
      var q = new URLSearchParams(window.location.search);
      var err = q.get('error');
      var verify = q.get('verify');
      if (verify === 'invalid') {
        setMsg('인증 링크가 유효하지 않거나 만료되었습니다. 로그인 후 인증 메일을 다시 받으세요.', true);
        return;
      }
      if (!err) return;
      var map = {
        google_unconfigured: '구글 로그인이 아직 설정되지 않았습니다.',
        state: '보안 검증에 실패했습니다. 다시 시도해주세요.',
        google: '구글 인증 중 오류가 발생했습니다.',
        token: '구글 인증 토큰을 받지 못했습니다.',
        noemail: '구글 계정에서 이메일을 가져오지 못했습니다.',
      };
      var el = document.getElementById('msg');
      el.textContent = map[err] || '로그인 중 오류가 발생했습니다.';
      el.className = 'msg error';
    })();

    function switchMode(m) {
      mode = m;
      document.getElementById('tab-login').classList.toggle('active', m === 'login');
      document.getElementById('tab-signup').classList.toggle('active', m === 'signup');
      document.getElementById('nameField').style.display = m === 'signup' ? 'block' : 'none';
      document.getElementById('pwHint').style.display = m === 'signup' ? 'block' : 'none';
      document.getElementById('submitBtn').textContent = m === 'signup' ? '회원가입' : '로그인';
      document.getElementById('password').setAttribute('autocomplete', m === 'signup' ? 'new-password' : 'current-password');
      setMsg('');
    }

    function setMsg(text, isError) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg' + (isError ? ' error' : '');
    }

    async function submitForm(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const name = document.getElementById('name').value.trim();
      const url = mode === 'signup' ? '/api/auth/signup' : '/api/auth/login';
      lastEmail = email;

      btn.disabled = true;
      setMsg('처리 중...');
      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, name })
        });
        const data = await res.json();

        // 이메일 미인증으로 로그인 차단 → 재발송 안내
        if (res.status === 403 && data.error === 'email_unverified') {
          showVerifyNotice(data.message || '이메일 인증이 필요합니다.', email);
          btn.disabled = false;
          return false;
        }
        if (!res.ok) {
          setMsg(data.error || '오류가 발생했습니다.', true);
          btn.disabled = false;
          return false;
        }
        // 가입 후 인증 대기 상태 → 앱으로 보내지 않고 안내
        if (data.pending_verification) {
          showVerifyNotice(data.message || '인증 메일을 확인하세요.', email, data.dev_verify_url);
          btn.disabled = false;
          return false;
        }
        window.location.href = '/';
      } catch (err) {
        setMsg('네트워크 오류가 발생했습니다.', true);
        btn.disabled = false;
      }
      return false;
    }

    // 인증 안내 + 재발송 버튼(+로컬 dev 링크) 표시
    function showVerifyNotice(message, email, devLink) {
      const el = document.getElementById('msg');
      el.className = 'msg';
      var html = '<div>📧 ' + escapeHtml(message) + '</div>' +
        '<button type="button" id="resendBtn" class="btn" style="margin-top:12px;padding:9px;font-size:13px;" ' +
        'onclick="resendVerification(\'' + escapeHtml(email) + '\')">인증 메일 재발송</button>';
      if (devLink) {
        html += '<div class="hint" style="margin-top:10px;">개발용 인증 링크: ' +
          '<a href="' + escapeHtml(devLink) + '" style="color:var(--purple);word-break:break-all;">인증하기</a></div>';
      }
      el.innerHTML = html;
    }

    async function resendVerification(email) {
      const b = document.getElementById('resendBtn');
      if (b) { b.disabled = true; b.textContent = '보내는 중...'; }
      try {
        const res = await fetch('/api/auth/resend-verification', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email })
        });
        const data = await res.json();
        showVerifyNotice(data.message || '인증 메일을 다시 보냈습니다.', email, data.dev_verify_url);
      } catch (e) {
        if (b) { b.disabled = false; b.textContent = '인증 메일 재발송'; }
      }
    }

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
        return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
      });
    }
  </script>
</body>
</html>
