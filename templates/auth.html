<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Master - 로그인</title>
<style>
:root {
  --bg: #0f0f1a; --bg2: #1a1a2e; --bg3: #25253e;
  --primary: #6366f1; --primary-hover: #818cf8;
  --green: #22c55e; --red: #ef4444; --amber: #f59e0b;
  --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
  --border: #334155; --radius: 12px;
  --glass-bg: rgba(255, 255, 255, 0.04);
  --glass-border: rgba(255, 255, 255, 0.08);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Noto Sans KR', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
}
.auth-container {
  background: var(--glass-bg); backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border); border-radius: 16px;
  padding: 40px; max-width: 420px; width: 100%;
  box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
  position: relative; overflow: hidden;
}
.auth-container::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, var(--primary), #a78bfa, #22d3ee);
}
.logo { text-align: center; margin-bottom: 32px; }
.logo h1 { font-size: 24px; font-weight: 700; }
.logo span { color: var(--primary); }
.logo p { color: var(--text3); font-size: 13px; margin-top: 8px; }

.tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; color: var(--text3); font-size: 14px; border-bottom: 2px solid transparent; transition: all 0.2s; }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }

.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
.form-group input {
  width: 100%; padding: 12px 14px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 14px; outline: none; transition: border-color 0.15s;
}
.form-group input:focus { border-color: var(--primary); }

.consent { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 12px; font-size: 12px; color: var(--text2); }
.consent input[type="checkbox"] { margin-top: 2px; cursor: pointer; }
.consent a { color: var(--primary); text-decoration: none; }
.consent a:hover { text-decoration: underline; }

.btn {
  width: 100%; padding: 12px; border-radius: 8px; border: none;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-primary { background: var(--primary); color: white; margin-top: 8px; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

.divider { display: flex; align-items: center; gap: 12px; margin: 24px 0 16px; color: var(--text3); font-size: 12px; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.oauth-btn { background: var(--bg2); color: var(--text); border: 1px solid var(--border); margin-bottom: 8px; }
.oauth-btn:hover { background: var(--bg3); }
.oauth-btn.google svg { width: 18px; height: 18px; }
.oauth-btn.kakao { background: #FEE500; color: #181600; border-color: #FEE500; }
.oauth-btn.kakao:hover { background: #FDD835; }

.error { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--red); color: var(--red); padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
.error.show { display: block; }

.success { background: rgba(34, 197, 94, 0.1); border: 1px solid var(--green); color: var(--green); padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
.success.show { display: block; }

.forgot-link { text-align: right; margin-top: 8px; }
.forgot-link a { color: var(--text2); font-size: 12px; text-decoration: none; }
.forgot-link a:hover { color: var(--primary); }
</style>
</head>
<body>
<div class="auth-container">
  <div class="logo">
    <h1><span>English</span> Master</h1>
    <p>AI 기반 영어 학습 플랫폼</p>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-login" onclick="switchTab('login')">로그인</div>
    <div class="tab" id="tab-signup" onclick="switchTab('signup')">회원가입</div>
  </div>

  <div class="error" id="error-msg"></div>
  <div class="success" id="success-msg"></div>

  <!-- Login Form -->
  <form id="login-form" onsubmit="doLogin(event)">
    <div class="form-group">
      <label>이메일</label>
      <input type="email" id="login-email" required autocomplete="email">
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="login-password" required autocomplete="current-password">
    </div>
    <div class="forgot-link"><a href="#" onclick="showForgotPassword()">비밀번호를 잊으셨나요?</a></div>
    <button type="submit" class="btn btn-primary">로그인</button>
  </form>

  <!-- Signup Form (hidden by default) -->
  <form id="signup-form" style="display:none;" onsubmit="doSignup(event)">
    <div class="form-group">
      <label>이메일</label>
      <input type="email" id="signup-email" required autocomplete="email">
    </div>
    <div class="form-group">
      <label>이름 (선택)</label>
      <input type="text" id="signup-name" autocomplete="name">
    </div>
    <div class="form-group">
      <label>비밀번호 (8자 이상)</label>
      <input type="password" id="signup-password" required minlength="8" autocomplete="new-password">
    </div>
    <div class="consent">
      <input type="checkbox" id="consent-terms" required>
      <label for="consent-terms">
        <a href="/terms" target="_blank">이용약관</a> 동의 (필수)
      </label>
    </div>
    <div class="consent">
      <input type="checkbox" id="consent-privacy" required>
      <label for="consent-privacy">
        <a href="/privacy" target="_blank">개인정보처리방침</a> 동의 (필수)
      </label>
    </div>
    <div class="consent">
      <input type="checkbox" id="consent-marketing">
      <label for="consent-marketing">마케팅 수신 동의 (선택)</label>
    </div>
    <button type="submit" class="btn btn-primary">회원가입</button>
  </form>

  <div class="divider">또는</div>

  <button class="btn oauth-btn google" onclick="location.href='/api/auth/oauth/google'">
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Google로 계속하기
  </button>
  <button class="btn oauth-btn kakao" onclick="location.href='/api/auth/oauth/kakao'">
    카카오로 계속하기
  </button>
</div>

<script>
function switchTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
  clearMessages();
}

function showError(msg) {
  var el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('success-msg').classList.remove('show');
}

function showSuccess(msg) {
  var el = document.getElementById('success-msg');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('error-msg').classList.remove('show');
}

function clearMessages() {
  document.getElementById('error-msg').classList.remove('show');
  document.getElementById('success-msg').classList.remove('show');
}

async function doLogin(e) {
  e.preventDefault();
  clearMessages();
  var email = document.getElementById('login-email').value;
  var password = document.getElementById('login-password').value;

  try {
    var res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email: email, password: password }),
    });
    var data = await res.json();
    if (!res.ok) {
      showError(data.message || '로그인 실패');
      return;
    }
    localStorage.setItem('access_token', data.access_token);
    window.location.href = '/';
  } catch (err) {
    showError('서버 연결 실패: ' + err.message);
  }
}

async function doSignup(e) {
  e.preventDefault();
  clearMessages();
  var payload = {
    email: document.getElementById('signup-email').value,
    name: document.getElementById('signup-name').value,
    password: document.getElementById('signup-password').value,
    consent_terms: document.getElementById('consent-terms').checked,
    consent_privacy: document.getElementById('consent-privacy').checked,
    consent_marketing: document.getElementById('consent-marketing').checked,
  };

  try {
    var res = await fetch('/api/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify(payload),
    });
    var data = await res.json();
    if (!res.ok) {
      showError(data.message || '회원가입 실패');
      return;
    }
    localStorage.setItem('access_token', data.access_token);
    showSuccess('회원가입 완료! 이메일 인증 메일을 확인해주세요.');
    setTimeout(function() { window.location.href = '/'; }, 1500);
  } catch (err) {
    showError('서버 연결 실패: ' + err.message);
  }
}

async function showForgotPassword() {
  var email = prompt('비밀번호 재설정 메일을 받을 이메일 주소를 입력하세요:');
  if (!email) return;
  try {
    var res = await fetch('/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email }),
    });
    var data = await res.json();
    showSuccess(data.message || '재설정 링크가 전송되었습니다');
  } catch (err) {
    showError('요청 실패');
  }
}

// Check for OAuth error in URL
var urlParams = new URLSearchParams(window.location.search);
var oauthError = urlParams.get('error');
if (oauthError) {
  showError('OAuth 로그인 실패: ' + oauthError);
}

// Check for access_token in hash (from OAuth redirect)
if (window.location.hash.startsWith('#access_token=')) {
  var token = window.location.hash.replace('#access_token=', '');
  localStorage.setItem('access_token', token);
  window.location.href = '/';
}
</script>
</body>
</html>
