# fly.toml app configuration file generated for english-master on 2026-07-06T13:32:35+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'english-master'
primary_region = 'nrt'

[build]

[env]
  DATA_DIR = '/data'
  OPEN_BROWSER = '0'
  PORT = '8080'

[[mounts]]
  source = 'em_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
